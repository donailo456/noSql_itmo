version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - .env.local
    depends_on:
      - redis
    ports:
      - "${APP_PORT}:${APP_PORT}"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    env_file:
      - .env.local
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"